# ehDP Full Example Configuration (ESPHome)
#
# Copy and adapt this file for your device.

esphome:
  name: my-clock
  friendly_name: My Clock
  project:
    name: "myclock"
    version: "1.0"

esp32:
  board: esp32dev
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# If you disable mDNS, do NOT set the 'mdns' field in the ehdp section below.
# mdns:
#   disabled: true

logger:
api:
ota:
  - platform: esphome

external_components:
  - source:
      type: git
      url: https://github.com/trip5/ehDP
      ref: main
    refresh: 60s
    components: [ ehdp ]

ehdp:
  # OPTIONAL: Material symbol codepoint (hex string recommended for compatibility)
  #   See: https://fonts.google.com/icons
  material_symbol: "0xe192"

  # OPTIONAL: id (required if using enable_disable feature below with a switch)
  # id: my_ehdp

  # OPTIONAL: Enable/disable feature (default: false)
  #   Set to true to enable runtime enable/disable via switch
  #   This adds state persistence and enable()/disable() methods
  #   Without this, ehDP is always on
  # enable_disable: true

  # Values for project, firmware, name, and mdns are automatically pulled 
  # from your global 'esphome:' section, reducing configuration redundancy.
  # The ui_port is automatically detected from the web_server component.
  #
  # You can still override them here if you wish:

  # name: "Custom Name"
  # project: "Custom Project"
  # firmware: "Custom Firmware"
  # version: "2.22"
  # mdns: "customhost"
  # ui_port: 80
  # webui: false  # Set to false to prevent UI port from being advertised
  # capabilities:
  #   - mqtt
  #   - homeassistant

# Example switch to disable/enable Discovery
# NOTE: This requires enable_disable: true in the ehdp section above!
# Uncomment both the ehdp id and enable_disable, and this switch to use this feature
# switch:
#   - platform: template
#     name: "ehDP Discovery"
#     id: ehdp_discovery
#     optimistic: true
#     turn_on_action:
#       - lambda: id(my_ehdp).enable();
#     turn_off_action:
#       - lambda: id(my_ehdp).disable();
#     entity_category: config
#     icon: mdi:home-variant
# 
# # Sync switch state with component state after boot
# esphome:
#   on_boot:
#     priority: -100  # Run after everything else is initialized
#     then:
#       - lambda: |-
#           id(ehdp_discovery).publish_state(id(my_ehdp).is_enabled());