name=ehDP
version=1.0.0
author=Trip5
maintainer=Trip5
sentence=Lightweight UDP discovery protocol for ESP32/ESP8266 IoT devices.
paragraph=ehDP (eh Discovery Protocol) lets your ESP device respond to a UDP broadcast discovery request with a structured JSON identity packet. Devices advertise their project name, firmware variant, user-given name, optional Material symbol, IP, optional mDNS hostname, web UI port, and capabilities. No REST API or web server required.
category=Communication
