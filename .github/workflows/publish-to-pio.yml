name: Publish to PlatformIO

on:
  workflow_run:
    workflows:
      - Create Release
    types:
      - completed

jobs:
  publish:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-tags: true

      - name: Install PlatformIO CLI
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio

      - name: Prepare package for PlatformIO
        run: |
          mkdir -p /tmp/pio-package
          cp -r examples /tmp/pio-package/
          cp -r include /tmp/pio-package/
          cp -r src /tmp/pio-package/
          cp README.md /tmp/pio-package/
          cp library.json /tmp/pio-package/
          cp library.properties /tmp/pio-package/
          cp LICENSE /tmp/pio-package/

      - name: Filter README for PlatformIO
        run: python .github/workflows/filter_readme.py /tmp/pio-package/README.md

      - name: Publish to PlatformIO
        run: pio pkg publish --no-interactive
        working-directory: /tmp/pio-package
        env:
          PLATFORMIO_AUTH_TOKEN: ${{ secrets.PLATFORMIO_AUTH_TOKEN }}